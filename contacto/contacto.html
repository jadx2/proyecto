<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto · Lumen</title>

    <link rel="stylesheet" href="../base.css" />
    <link rel="stylesheet" href="contacto.css" />
  </head>
  <body>
    <main>
      <header>
        <small>ESCRÍBENOS</small>
        <h2>Contáct<em>anos</em>.</h2>
        <p>
          Para consultas de programación, prensa o envíos. Leemos todo, tarde o
          temprano.
        </p>
      </header>

      <section>
        <form id="contacto-form">
          <div>
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required />
          </div>

          <div>
            <label for="correo">Correo</label>
            <input type="email" id="correo" required />
          </div>

          <div>
            <label for="asunto">Asunto</label>
            <select id="asunto" name="asunto" required>
              <option value="" selected disabled>Selecciona un asunto</option>
              <option value="programacion">Consulta de programación</option>
              <option value="prensa">Prensa</option>
              <option value="envio">Envío</option>
              <option value="general">General</option>
            </select>
          </div>

          <div>
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" rows="6" required></textarea>
          </div>

          <div>
            <input type="checkbox" id="consent" required />
            <label for="consent"
              >Doy mi consentimiento para ser contactado con el correo
              indicado.</label
            >
          </div>
          <div>
            <span>Prototipo · Envío Simulado</span>
            <button type="submit">Enviar Mensaje</button>
          </div>

          <div id="alerta-exito" hidden>
            <p>
              <strong>¡Mensaje enviado exitosamente!</strong> Estaremos en
              contacto con usted pronto.
            </p>
          </div>
        </form>
      </section>
    </main>

    <script src="../shared/layout.js"></script>
  </body>
</html>
